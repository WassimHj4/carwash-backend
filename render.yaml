services:
  - type: web
    name: carwash-backend
    runtime: docker
    plan: free
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: carwash-db
          property: connectionString
      - key: FRONTEND_URL
        value: https://car-wash-one-eta.vercel.app/   # replace with your actual Vercel URL
      - key: ASPNETCORE_ENVIRONMENT
        value: Production

databases:
  - name: carwash-db
    plan: free
    databaseName: carwash
